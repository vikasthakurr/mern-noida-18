<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopAssist RAG Chatbot</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="background">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
    </div>

    <div class="container">
      <header>
        <div class="logo">
          <div class="logo-icon">🛍️</div>
          <h1>ShopAssist <span>RAG AI</span></h1>
        </div>
        <div class="status"><span class="status-dot"></span> Online</div>
      </header>

      <main id="chat-window">
        <div class="message bot-message">
          <div class="avatar">🤖</div>
          <div class="message-content">
            <p>
              Hello! I'm your AI shopping assistant. Ask me anything about our
              products in `data.json`!
            </p>
            <span class="time">Just now</span>
          </div>
        </div>
      </main>

      <footer>
        <form id="chat-form">
          <input
            type="text"
            id="user-input"
            placeholder="Type your message..."
            autocomplete="off"
          />
          <button type="submit" id="send-btn">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </form>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
